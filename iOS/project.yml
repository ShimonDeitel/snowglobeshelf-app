name: SnowGlobeShelf
options:
  bundleIdPrefix: com.shimondeitel.snowglobeshelf
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SnowGlobeShelf:
    type: application
    platform: iOS
    sources:
      - path: SnowGlobeShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snowglobeshelf
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SnowGlobeShelf/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SnowGlobeShelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SnowGlobeShelfTests
      - path: SnowGlobeShelf.storekit
    dependencies:
      - target: SnowGlobeShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snowglobeshelf.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SnowGlobeShelfUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SnowGlobeShelfUITests
    dependencies:
      - target: SnowGlobeShelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snowglobeshelf.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SnowGlobeShelf:
    build:
      targets:
        SnowGlobeShelf: all
        SnowGlobeShelfTests: [test]
        SnowGlobeShelfUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SnowGlobeShelf.storekit
    test:
      config: Debug
      storeKitConfiguration: SnowGlobeShelf.storekit
      targets:
        - SnowGlobeShelfTests
        - SnowGlobeShelfUITests
    archive:
      config: Release
